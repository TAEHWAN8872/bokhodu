<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>복호두 원가 계산기</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #ffffff;
    --bg-sub:       #f7f7f6;
    --bg-card:      #ffffff;
    --bg-selected:  #f0f7ff;
    --bg-saved:     #f0faf0;
    --bg-input:     #fafafa;

    --ink:          #111110;
    --ink-2:        #6b6b67;
    --ink-3:        #a8a8a3;

    --accent:       #2563eb;
    --accent-bg:    #eff6ff;
    --accent-border:#93c5fd;

    --green:        #16a34a;
    --green-bg:     #f0fdf4;
    --green-border: #86efac;

    --red:          #dc2626;
    --red-bg:       #fff1f1;
    --red-border:   #fca5a5;

    --orange:       #ea580c;
    --orange-bg:    #fff7ed;
    --orange-border:#fdba74;

    --border:       #e5e5e3;
    --border-strong:#d0d0cd;

    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;

    --font: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', sans-serif;
    --font-mono: 'SF Mono', 'Fira Mono', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:           #111110;
      --bg-sub:       #1a1a18;
      --bg-card:      #1e1e1c;
      --bg-selected:  #1a2a3a;
      --bg-saved:     #0d1f14;
      --bg-input:     #1a1a18;

      --ink:          #f0efeb;
      --ink-2:        #9a9994;
      --ink-3:        #5a5a56;

      --accent:       #60a5fa;
      --accent-bg:    #1e3a5f;
      --accent-border:#3b82f6;

      --green:        #4ade80;
      --green-bg:     #052e16;
      --green-border: #166534;

      --red:          #f87171;
      --red-bg:       #2d1010;
      --red-border:   #991b1b;

      --orange:       #fb923c;
      --orange-bg:    #2d1a0a;
      --orange-border:#9a3412;

      --border:       #2a2a28;
      --border-strong:#3a3a38;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg-sub);
    color: var(--ink);
    min-height: 100vh;
    padding: 32px 16px 80px;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .header-left {}

  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  header p {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.5;
  }

  /* ── 전체 초기화 버튼 ── */
  .btn-reset-all {
    padding: 9px 14px;
    border-radius: var(--r-sm);
    border: 1px solid var(--red-border);
    background: var(--red-bg);
    color: var(--red);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: opacity 0.12s;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: center;
  }
  .btn-reset-all:hover { opacity: 0.78; }

  /* ── 생산알수 글로벌 패널 ── */
  .global-eggs-panel {
    background: var(--bg-card);
    border: 1px solid var(--orange-border);
    border-radius: var(--r-lg);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .global-eggs-left {
    flex: 1;
    min-width: 160px;
  }

  .global-eggs-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .global-eggs-label svg {
    width: 14px; height: 14px; flex-shrink: 0;
  }

  .global-eggs-desc {
    font-size: 11px;
    color: var(--ink-3);
    line-height: 1.5;
  }

  .global-eggs-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .global-eggs-input {
    border: 1.5px solid var(--orange-border);
    border-radius: var(--r-sm);
    padding: 9px 12px;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    background: var(--orange-bg);
    width: 110px;
    font-family: var(--font);
    font-variant-numeric: tabular-nums;
    text-align: center;
    transition: border-color 0.12s, box-shadow 0.12s;
  }

  .global-eggs-input:focus {
    outline: none;
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(234,88,12,0.12);
    background: var(--bg-card);
  }

  .global-eggs-input::placeholder { color: var(--ink-3); font-weight: 400; }

  .btn-apply-all {
    padding: 9px 16px;
    border-radius: var(--r-sm);
    border: none;
    background: var(--orange);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: opacity 0.12s;
    white-space: nowrap;
  }
  .btn-apply-all:hover { opacity: 0.85; }

  .eggs-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--orange);
    background: var(--orange-bg);
    border: 1px solid var(--orange-border);
    border-radius: 20px;
    padding: 2px 8px;
  }

  /* ── 탭 ── */
  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 3px;
  }

  .tab-btn {
    flex: 1;
    padding: 8px 16px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--ink-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .tab-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 1px 3px rgba(37,99,235,0.25);
  }

  .section-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 20px;
  }

  .section-title:first-child { margin-top: 0; }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 6px;
    margin-bottom: 4px;
  }

  .product-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 11px 13px;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s, box-shadow 0.12s;
    user-select: none;
  }

  .product-card:hover {
    border-color: var(--border-strong);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .product-card.selected {
    border-color: var(--accent-border);
    background: var(--bg-selected);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
  }

  .product-card.saved {
    border-color: var(--green-border);
    background: var(--bg-saved);
  }

  .product-card.saved.selected {
    border-color: var(--accent-border);
    background: var(--bg-selected);
  }

  .product-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 3px;
    line-height: 1.4;
  }

  .product-card.selected .product-name { color: var(--accent); }
  .product-card.saved .product-name     { color: var(--green); }
  .product-card.saved.selected .product-name { color: var(--accent); }

  .product-price {
    font-size: 12px;
    color: var(--ink-2);
    font-variant-numeric: tabular-nums;
  }

  .product-card.selected .product-price { color: var(--accent); opacity: 0.75; }
  .product-card.saved .product-price    { color: var(--green);  opacity: 0.75; }

  .saved-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    margin-left: 4px;
    vertical-align: middle;
    margin-bottom: 1px;
  }

  .placeholder {
    color: var(--ink-3);
    font-size: 14px;
    padding: 48px 0;
    text-align: center;
    margin-top: 20px;
    background: var(--bg-card);
    border: 1px dashed var(--border-strong);
    border-radius: var(--r-lg);
  }

  .calc-panel {
    margin-top: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
  }

  .calc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 6px;
    background: var(--bg-sub);
  }

  .calc-product-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .calc-product-price {
    font-size: 13px;
    color: var(--ink-2);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-variant-numeric: tabular-nums;
  }

  /* ── 계산기 내부 생산알수 표시줄 ── */
  .calc-eggs-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--orange-bg);
    border-bottom: 1px solid var(--orange-border);
    gap: 8px;
    flex-wrap: wrap;
  }
  .calc-eggs-bar-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--orange);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .calc-eggs-bar-value {
    font-size: 13px;
    font-weight: 700;
    color: var(--orange);
    font-variant-numeric: tabular-nums;
  }
  .calc-eggs-bar-hint {
    font-size: 11px;
    color: var(--ink-3);
    font-weight: 400;
  }

  .cost-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  @media (max-width: 420px) {
    .cost-grid { grid-template-columns: 1fr; }
  }

  .cost-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 14px 16px;
    background: var(--bg-card);
  }

  .cost-label {
    font-size: 11px;
    color: var(--ink-2);
    font-weight: 600;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .cost-hint {
    font-weight: 400;
    font-size: 10px;
    color: var(--ink-3);
    font-family: var(--font-mono);
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .input-row .cost-input { flex: 1; min-width: 0; }

  .cost-input {
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    padding: 7px 9px;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg-input);
    width: 100%;
    font-family: var(--font);
    transition: border-color 0.12s, box-shadow 0.12s;
    font-variant-numeric: tabular-nums;
  }

  .cost-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    background: var(--bg-card);
  }

  .cost-calc-val {
    font-size: 12px;
    color: var(--accent);
    white-space: nowrap;
    min-width: 48px;
    text-align: right;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    font-family: var(--font-mono);
  }

  .cost-profit-val { display: none; }

  .cost-fixed {
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 7px 9px;
    font-size: 13px;
    color: var(--ink-3);
    background: var(--bg-sub);
    width: 100%;
    font-variant-numeric: tabular-nums;
  }

  .cost-preset-display {
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    padding: 7px 9px;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg-input);
    width: 100%;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
    font-variant-numeric: tabular-nums;
  }

  .cost-preset-display:hover {
    border-color: var(--accent);
    background: var(--accent-bg);
    color: var(--accent);
  }

  .result-bar {
    display: grid;
    grid-template-columns: 1fr 1.5fr 1fr;
    padding: 0;
    align-items: stretch;
  }

  .result-card {
    padding: 18px 16px;
    text-align: center;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .result-card + .result-card::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 1px;
    background: var(--border);
  }

  .result-card:nth-child(2) {
    background: var(--bg-sub);
    padding: 24px 16px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  .result-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 6px;
  }

  .result-card:nth-child(2) .result-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .result-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }

  .result-card:nth-child(2) .result-value {
    font-size: 30px;
    letter-spacing: -0.03em;
  }

  .result-value.positive { color: var(--green); }
  .result-value.negative { color: var(--red); }

  .result-pct {
    font-size: 12px;
    color: var(--ink-3);
    margin-top: 4px;
    font-weight: 500;
  }

  .result-card:nth-child(2) .result-pct {
    font-size: 14px;
    font-weight: 600;
    margin-top: 6px;
  }

  .result-pct.positive { color: var(--green); }
  .result-pct.negative { color: var(--red); }

  .action-bar {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-sub);
  }

  .btn-save {
    flex: 2;
    padding: 10px;
    border-radius: var(--r-sm);
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: opacity 0.12s;
    letter-spacing: 0.01em;
  }

  .btn-save:hover { opacity: 0.88; }

  .btn-reset {
    flex: 1;
    padding: 10px;
    border-radius: var(--r-sm);
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    color: var(--ink-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.12s, color 0.12s;
  }

  .btn-reset:hover {
    background: var(--bg-sub);
    color: var(--ink);
  }

  .save-toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: var(--ink);
    color: var(--bg);
    padding: 9px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 999;
    white-space: nowrap;
  }

  .save-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s;
  }

  .modal-backdrop.show {
    opacity: 1;
    pointer-events: all;
  }

  .modal-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 24px 24px 20px;
    max-width: 300px;
    width: calc(100% - 40px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    transform: scale(0.95) translateY(8px);
    transition: transform 0.18s;
  }

  .modal-backdrop.show .modal-box {
    transform: scale(1) translateY(0);
  }

  .modal-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #fef2f2;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    font-size: 18px;
  }

  .modal-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }

  .modal-desc {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.55;
    margin-bottom: 20px;
    white-space: pre-line;
  }

  .modal-btns {
    display: flex;
    gap: 8px;
  }

  .modal-btn-cancel {
    flex: 1;
    padding: 10px;
    border-radius: var(--r-sm);
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    color: var(--ink-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.12s;
  }

  .modal-btn-cancel:hover { background: var(--bg-sub); }

  .modal-btn-confirm {
    flex: 1;
    padding: 10px;
    border-radius: var(--r-sm);
    border: none;
    background: var(--red);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: opacity 0.12s;
  }

  .modal-btn-confirm:hover { opacity: 0.85; }

  .hidden { display: none; }

  /* ── 원가 항목 그룹 색상 ── */
  .cost-item.group-ingredient {
    background: #fffbf0;
    border-left: 3px solid #f59e0b;
  }
  .cost-item.group-butter {
    background: #fdf4ff;
    border-left: 3px solid #a855f7;
  }
  .cost-item.group-packaging {
    background: #f0f9ff;
    border-left: 3px solid #0ea5e9;
  }
  @media (prefers-color-scheme: dark) {
    .cost-item.group-ingredient { background: #1f1a0a; border-left-color: #d97706; }
    .cost-item.group-butter     { background: #1a0f20; border-left-color: #9333ea; }
    .cost-item.group-packaging  { background: #071b26; border-left-color: #0284c7; }
  }

  /* 그룹 구분선 — 포장재 첫 번째 아이템 위에 */
  .cost-item.group-packaging-first {
    grid-column: 1 / -1;
    background: var(--bg-sub);
    padding: 6px 16px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-3);
    border-left: none;
    pointer-events: none;
  }

  /* ── 선물세트 전용 ── */
  .cost-item.linked {
    background: var(--bg-sub);
    position: relative;
  }
  .cost-item.linked::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .linked-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    border-radius: 10px;
    padding: 1px 6px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .linked-value {
    font-size: 13px;
    color: var(--ink);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 7px 9px;
    width: 100%;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

// 답례품(8개입) 저장값으로부터 원가 계산
function calcLinked8Cost(sourceName) {
  const s = savedCosts[sourceName];
  if (!s) return null; // 저장 안 됨
  const eggs = s.eggs || globalEggs || 0;
  // costFields8 로직 그대로 재현
  let total = 0;
  const butterCfg = getButterConfig(sourceName);
  const butterKeys = ['butter_dono', 'butter_apple', 'butter_lemon'];
  costFields8.forEach(f => {
    if (butterKeys.includes(f.key) && !(f.key in butterCfg)) return;
    if (f.type === 'fixed') { total += f.fixed; return; }
    if (f.type === 'eggs')  { return; }
    const v = s[f.key] !== undefined ? s[f.key] : f.defaultVal;
    let contrib = 0;
    if (butterKeys.includes(f.key)) {
      const mult = butterCfg[f.key];
      if (f.key === 'butter_dono')       contrib = v / 2700 * mult;
      else if (f.key === 'butter_apple') contrib = v / 600  * mult;
      else if (f.key === 'butter_lemon') contrib = v / 2300 * mult;
    } else if (['premix','redbean','walnut','milk','egg','dough_butter'].includes(f.key)) {
      if (f.key === 'premix')            contrib = eggs > 0 ? v / eggs * 8 : 0;
      else if (f.key === 'redbean')      contrib = eggs > 0 ? v / eggs * 8 : 0;
      else if (f.key === 'walnut')       contrib = eggs > 0 ? v / 4 / eggs * 8 : 0;
      else if (f.key === 'milk')         contrib = eggs > 0 ? v / eggs * 8 : 0;
      else if (f.key === 'egg')          contrib = eggs > 0 ? v / 30 * 110 / eggs * 8 : 0;
      else if (f.key === 'dough_butter') contrib = eggs > 0 ? v / eggs * 8 : 0;
    } else {
      contrib = f.formula ? f.formula(v, eggs) : 0;
    }
    total += contrib;
  });
  return total;
}

// 사이드 메뉴 저장값으로부터 원가 계산
function calcLinkedSideCost(sourceName) {
  const s = savedCosts[sourceName];
  const fields = costFieldsSide[sourceName];
  if (!s || !fields) return null;
  let total = 0;
  fields.forEach(f => {
    if (f.type === 'fixed') { total += f.fixed; return; }
    const v = s[f.key] !== undefined ? s[f.key] : f.defaultVal;
    const contrib = f.formula ? f.formula(v) : 0;
    total += contrib;
  });
  return total;
}

function isGiftSet(name) { return name in costFieldsGift; }

  if (name in costFieldsSide) return costFieldsSide[name];

  return name.includes('8개입') ? costFields8 : costFields20;
}

function fmt(n) {
  if (n === null || n === undefined || n === '') return '';
  return Number(n).toLocaleString('ko-KR');
}

function fmtCalc(n) {
  if (!n || n === 0) return '-';
  const s = n.toFixed(2).replace(/\.?0+$/, '');
  return s + '원';
}

function fmtTimes20(contrib) {
  if (!contrib || contrib === 0) return null;
  const val = contrib * 20;
  return (Math.round(val * 100) / 100).toLocaleString('ko-KR', {maximumFractionDigits:2}) + '원';
}

    count++;
  });
  try { localStorage.setItem('bokhodu_costs', JSON.stringify(savedCosts)); } catch(e) {}

  refreshAllGrids();

  // 현재 열린 계산기에도 반영
  if (currentOpenName && currentOpenPrice) {
    syncEggsInputInCalc(v);
    updateResult(currentOpenName, currentOpenPrice);
  }

  showToast(`생산알수 ${v.toLocaleString()}알 — 전 메뉴(${count}종) 적용 완료 ✓`);
}

// 열린 계산기의 eggs 인풋 동기화
function syncEggsInputInCalc(v) {
  const eggsEl = document.getElementById('ci-eggs');
  if (eggsEl) {
    eggsEl.value = v > 0 ? v : '';
  }
  const eggsBadge = document.getElementById('calc-eggs-value');
  if (eggsBadge) eggsBadge.textContent = v > 0 ? v.toLocaleString() + '알' : '미입력';
}

// ── 전체 초기화 ──
function confirmResetAll() {
  const modal = document.getElementById('confirm-modal');
  document.getElementById('modal-title').textContent = '전체 초기화';
  document.getElementById('modal-desc').textContent =
    '저장된 모든 메뉴의 원가 데이터와\n생산알수를 초기화합니다.\n이 작업은 되돌릴 수 없습니다.';

  _pendingResetCallback = () => {
    closeModal();
    doResetAll();
  };
  document.getElementById('modal-confirm-btn').onclick = _pendingResetCallback;
  modal.classList.add('show');
  modal.onclick = (e) => { if (e.target === modal) closeModal(); };
}

function doResetAll() {
  // 모든 저장 데이터 삭제
  for (const k in savedCosts) delete savedCosts[k];
  globalEggs = 0;
  try {
    localStorage.removeItem('bokhodu_costs');
    localStorage.removeItem('bokhodu_global_eggs');
  } catch(e) {}

  // 생산알수 인풋 초기화
  document.getElementById('global-eggs').value = '';

  refreshAllGrids();

  // 열려있는 계산기 다시 렌더
  if (currentOpenName && currentOpenPrice) {
    renderCalc(currentOpenName, currentOpenPrice);
    // selectedEl 복원
    if (selectedEl) selectedEl.classList.add('selected');
  }

  showToast('전체 초기화 완료');
}

// ── 그리드 렌더 ──
function renderGrid(id, list) {
  const el = document.getElementById(id);
  el.innerHTML = list.map((p, i) => {
    const isSaved = !!savedCosts[p.name];
    const savedCls = isSaved ? ' saved' : '';
    const dot = isSaved ? '<span class="saved-dot"></span>' : '';
    return `<div class="product-card${savedCls}" id="card-${id}-${i}"
      onclick="selectProduct(this,'${p.name.replace(/'/g,"\\'")}',${p.price})">
      <div class="product-name">${p.name}${dot}</div>
      <div class="product-price">${p.price.toLocaleString()}원</div>
    </div>`;
  }).join('');
}

let selectedEl = null;
let currentOpenName = null;
let currentOpenPrice = null;

renderGrid('grid-mix-20',    products.mix20);
renderGrid('grid-single-20', products.single20);
renderGrid('grid-single-8',  products.single8);
renderGrid('grid-mix-8',     products.mix8);
renderGrid('grid-side',      products.side);
renderGrid('grid-gift',      products.gift);

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active',
      (t === '20'   && i === 0) ||
      (t === '8'    && i === 1) ||
      (t === 'side' && i === 2) ||
      (t === 'gift' && i === 3)
    )
  );
  document.getElementById('panel-20').classList.toggle('hidden',   t !== '20');
  document.getElementById('panel-8').classList.toggle('hidden',    t !== '8');
  document.getElementById('panel-side').classList.toggle('hidden', t !== 'side');
  document.getElementById('panel-gift').classList.toggle('hidden', t !== 'gift');
  if (selectedEl) { selectedEl.classList.remove('selected'); selectedEl = null; }
  currentOpenName = null;
  currentOpenPrice = null;
  document.getElementById('calc-area').innerHTML =
    '<div class="placeholder">제품을 클릭하면 원가 계산기가 열립니다</div>';
}

function selectProduct(el, name, price) {
  if (selectedEl) selectedEl.classList.remove('selected');
  el.classList.add('selected');
  selectedEl = el;
  renderCalc(name, price);
}

function togglePreset(key, name, price) {
  const display = document.getElementById('pd-' + key);
  const input   = document.getElementById('pi-' + key);
  if (!display || !input) return;
  const isEditing = input.style.display !== 'none';
  if (isEditing) {
    const raw = parseFloat(input.value) || 0;
    display.textContent = fmt(raw);
    display.style.display = '';
    input.style.display = 'none';
    updateResult(name, price);
  } else {
    display.style.display = 'none';
    input.style.display = '';
    input.focus();
    input.select();
  }
}

function getButterConfig(name) {
  const hasDono  = name.includes('앙');
  const hasApple = name.includes('청사과');
  const hasLemon = name.includes('레몬');
  const isMix    = name.includes('&');
  const is8      = name.includes('8개입');
  const multi = is8 ? (isMix ? 4 : 8) : (isMix ? 10 : 20);
  const result = {};
  if (hasDono)  result['butter_dono']  = multi;
  if (hasApple) result['butter_apple'] = multi;
  if (hasLemon) result['butter_lemon'] = multi;
  return result;
}

function renderCalc(name, price) {
  currentOpenName  = name;
  currentOpenPrice = price;

  const saved = savedCosts[name] || {};
  const esc = name.replace(/'/g,"\'");
  const butterCfg = getButterConfig(name);
  const butterKeys = ['butter_dono', 'butter_apple', 'butter_lemon'];
  const is8 = name.includes('8개입');
  const isSideMenu = name in costFieldsSide;
  const isGift = isGiftSet(name);
  const fields = getCostFields(name);

  // 생산알수: saved > global > 0
  const eggsVal = saved.eggs !== undefined ? saved.eggs
                : (globalEggs > 0 ? globalEggs : '');

  // ── 선물세트 전용 렌더 ──
  if (isGift) {
    const rows = fields.map(f => {
      if (f.type === 'fixed') {
        return `<div class="cost-item">
          <label class="cost-label">${f.label} <span class="cost-hint">고정</span></label>
          <div class="input-row">
            <div class="cost-fixed">${fmt(f.fixed)}</div>
            <span class="cost-calc-val">${fmt(f.fixed)}원</span>
          </div>
        </div>`;
      }
      if (f.type === 'linked8') {
        const val = calcLinked8Cost(f.sourceKey);
        const hasSave = savedCosts[f.sourceKey];
        const display = val !== null
          ? `<div class="linked-value">${val.toFixed(1)}원</div>`
          : `<div class="linked-value no-data">저장값 없음 — 답례품 탭에서 먼저 저장하세요</div>`;
        const badge = hasSave ? '<span class="linked-badge">연동됨</span>' : '';
        return `<div class="cost-item linked" id="li-${f.key}">
          <label class="cost-label">${f.label}${badge}</label>
          <div class="input-row">
            ${display}
            <span class="cost-calc-val" id="cv-${f.key}">${val !== null ? fmtCalc(val) : '-'}</span>
          </div>
        </div>`;
      }
      if (f.type === 'linked_side') {
        const val = calcLinkedSideCost(f.sourceKey);
        const hasSave = savedCosts[f.sourceKey];
        const display = val !== null
          ? `<div class="linked-value">${val.toFixed(1)}원</div>`
          : `<div class="linked-value no-data">저장값 없음 — 사이드 탭에서 먼저 저장하세요</div>`;
        const badge = hasSave ? '<span class="linked-badge">연동됨</span>' : '';
        return `<div class="cost-item linked" id="li-${f.key}">
          <label class="cost-label">${f.label}${badge}</label>
          <div class="input-row">
            ${display}
            <span class="cost-calc-val" id="cv-${f.key}">${val !== null ? fmtCalc(val) : '-'}</span>
          </div>
        </div>`;
      }
      return '';
    }).join('');

    const infoBar = `
      <div class="gift-info-bar">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M8 2L8 14M2 8L14 8" stroke-linecap="round"/>
          <rect x="2" y="5" width="12" height="9" rx="1.5"/>
          <path d="M5 5C5 3.5 6.5 2 8 2C9.5 2 11 3.5 11 5" stroke-linecap="round" fill="none"/>
        </svg>
        각 구성품 원가는 저장된 값에서 자동 연동됩니다. 값을 바꾸려면 해당 탭에서 수정 후 저장하세요.
      </div>`;

    document.getElementById('calc-area').innerHTML =
      `<div class="calc-panel">
        <div class="calc-header">
          <span class="calc-product-name">${name}</span>
          <span class="calc-product-price">판매가 ${price.toLocaleString()}원</span>
        </div>
        ${infoBar}
        <div class="cost-grid">${rows}</div>
        <div class="result-bar" id="result-bar"></div>
        <div class="action-bar">
          <button class="btn-save" onclick="saveData('${esc}')">저장하기</button>
          <button class="btn-reset" onclick="confirmReset('${esc}',${price})">초기화</button>
        </div>
      </div>`;

    updateResult(name, price);
    return;
  }

  // ── 기존 일반 렌더 ──

  let lastGroup = null;
  const rows = fields.length === 0
    ? `<div class="cost-item" style="grid-column:1/-1;color:var(--ink-3);font-size:13px;text-align:center;padding:24px 16px;">원가 항목이 없습니다</div>`
    : fields.map(f => {
    if (butterKeys.includes(f.key) && !(f.key in butterCfg)) return '';

    const group = f.group || '';
    let divider = '';
    if (group === 'packaging' && lastGroup !== 'packaging') {
      divider = `<div class="cost-item group-packaging-first" style="grid-column:1/-1;background:var(--bg-sub);padding:6px 16px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-3);pointer-events:none;">📦 포장재</div>`;
    }
    if (group) lastGroup = group;

    const groupClass = group ? ` group-${group}` : '';

    if (f.type === 'fixed') {
      return divider + `<div class="cost-item${groupClass}">
        <label class="cost-label">${f.label} <span class="cost-hint">고정</span></label>
        <div class="input-row">
          <div class="cost-fixed">${fmt(f.fixed)}</div>
          <span class="cost-calc-val">${fmt(f.fixed)}원</span>
        </div>
      </div>`;
    }

    // 생산알수 필드 — 글로벌 연동 인풋
    if (f.type === 'eggs') {
      return divider + `<div class="cost-item${groupClass}">
        <label class="cost-label">${f.label} <span class="cost-hint">${f.hint}</span></label>
        <div class="input-row">
          <input class="cost-input eggs-input" type="number" id="ci-eggs" placeholder="알수 입력"
            value="${eggsVal}"
            oninput="onCalcEggsChange('${esc}',${price})" />
          <span class="cost-calc-val" id="cv-eggs">-</span>
        </div>
      </div>`;
    }

    if (f.type === 'preset') {
      const initVal = saved[f.key] !== undefined ? saved[f.key] : f.defaultVal;
      const profitRow = profit20Keys.has(f.key) && !is8
        ? `<div class="cost-profit-val" id="cp-${f.key}"></div>`
        : '';
      let hintText = f.hint || '';
      if (butterKeys.includes(f.key)) {
        if (f.key === 'butter_apple') hintText = '÷ 600 ×' + butterCfg[f.key];
        else if (f.key === 'butter_lemon') hintText = '÷ 2,300 ×' + butterCfg[f.key];
        else hintText = '÷ 2,700 ×' + butterCfg[f.key];
      }
      return divider + `<div class="cost-item${groupClass}">
        <label class="cost-label">${f.label} <span class="cost-hint">${hintText}</span></label>
        <div class="input-row">
          <div class="preset-wrap" style="flex:1;min-width:0;">
            <div id="pd-${f.key}" class="cost-preset-display" onclick="togglePreset('${f.key}','${esc}',${price})"
              title="클릭하여 수정">${fmt(initVal)}</div>
            <input id="pi-${f.key}" class="cost-input" type="number" style="display:none"
              value="${initVal}"
              onblur="togglePreset('${f.key}','${esc}',${price})"
              oninput="updateResult('${esc}',${price})" />
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
            <span class="cost-calc-val" id="cv-${f.key}">-</span>
            ${profitRow}
          </div>
        </div>
      </div>`;
    }

    const val = saved[f.key] !== undefined ? saved[f.key] : '';
    return divider + `<div class="cost-item${groupClass}">
      <label class="cost-label">${f.label} <span class="cost-hint">${f.hint||''}</span></label>
      <div class="input-row">
        <input class="cost-input" type="number" id="ci-${f.key}" placeholder="0"
          value="${val}" oninput="updateResult('${esc}',${price})" />
        <span class="cost-calc-val" id="cv-${f.key}">-</span>
      </div>
    </div>`;
  }).join('');

  // 생산알수 상단 표시줄 (사이드 메뉴에는 표시 안 함)
  const eggsBarHtml = isSideMenu ? '' : `
    <div class="calc-eggs-bar">
      <span class="calc-eggs-bar-label">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7">
          <ellipse cx="8" cy="9" rx="4.5" ry="6"/>
        </svg>
        생산알수
      </span>
      <span class="calc-eggs-bar-value" id="calc-eggs-value">${eggsVal ? Number(eggsVal).toLocaleString() + '알' : '미입력'}</span>
      <span class="calc-eggs-bar-hint">위 패널에서 일괄 변경 가능</span>
    </div>`;

  document.getElementById('calc-area').innerHTML =
    `<div class="calc-panel">
      <div class="calc-header">
        <span class="calc-product-name">${name}</span>
        <span class="calc-product-price">판매가 ${price.toLocaleString()}원</span>
      </div>
      ${eggsBarHtml}
      <div class="cost-grid">${rows}</div>
      <div class="result-bar" id="result-bar"></div>
      <div class="action-bar">
        <button class="btn-save" onclick="saveData('${esc}')">저장하기</button>
        <button class="btn-reset" onclick="confirmReset('${esc}',${price})">초기화</button>
      </div>
    </div>`;

  updateResult(name, price);
}

// 계산기 내 생산알수 변경 시 — 글로벌 패널에도 동기화
function onCalcEggsChange(name, price) {
  const v = parseInt(document.getElementById('ci-eggs')?.value) || 0;
  globalEggs = v;
  try { localStorage.setItem('bokhodu_global_eggs', v); } catch(e) {}

  // 글로벌 인풋 동기화
  const gEl = document.getElementById('global-eggs');
  if (gEl) gEl.value = v > 0 ? v : '';

  // 상단 배지 업데이트
  const badge = document.getElementById('calc-eggs-value');
  if (badge) badge.textContent = v > 0 ? v.toLocaleString() + '알' : '미입력';

  updateResult(name, price);
}

function getFieldVal(f) {
  if (f.type === 'fixed') return f.fixed;
  if (f.type === 'eggs')  return parseFloat(document.getElementById('ci-eggs')?.value) || 0;
  if (f.type === 'preset') return parseFloat(document.getElementById('pi-' + f.key)?.value) || 0;
  return parseFloat(document.getElementById('ci-' + f.key)?.value) || 0;
}

function updateResult(name, price) {
  const isGift = isGiftSet(name);

  // ── 선물세트: linked 필드에서 합산 ──
  if (isGift) {
    const fields = costFieldsGift[name];
    let total = 0;
    fields.forEach(f => {
      let contrib = 0;
      if (f.type === 'fixed') {
        contrib = f.fixed;
      } else if (f.type === 'linked8') {
        const v = calcLinked8Cost(f.sourceKey);
        contrib = v !== null ? v : 0;
      } else if (f.type === 'linked_side') {
        const v = calcLinkedSideCost(f.sourceKey);
        contrib = v !== null ? v : 0;
      }
      total += contrib;
      const cvEl = document.getElementById('cv-' + f.key);
      if (cvEl) cvEl.textContent = contrib > 0 ? fmtCalc(contrib) : '-';
    });

    currentVals[name] = { _gift: true, _total: total };

    const margin = price - total;
    const marginPct = price > 0 ? ((margin / price) * 100).toFixed(1) : null;
    const costPct   = price > 0 ? ((total  / price) * 100).toFixed(1) : null;
    const cls = margin >= 0 ? 'positive' : 'negative';

    document.getElementById('result-bar').innerHTML =
      `<div class="result-card">
        <div class="result-label">총 원가</div>
        <div class="result-value">${total.toFixed(1)}원</div>
        <div class="result-pct">${costPct !== null ? costPct + '%' : '-'}</div>
      </div>
      <div class="result-card">
        <div class="result-label">마진</div>
        <div class="result-value ${cls}">${margin.toFixed(1)}원</div>
        <div class="result-pct ${cls}">${marginPct !== null ? marginPct + '%' : '-'}</div>
      </div>
      <div class="result-card">
        <div class="result-label">판매가</div>
        <div class="result-value">${price.toLocaleString()}원</div>
      </div>`;
    return;
  }

  // ── 기존 일반 계산 ──
  const eggs = getFieldVal({ type:'eggs' });
  let total = 0;
  const vals = {};
  const butterCfg = getButterConfig(name);
  const butterKeys = ['butter_dono', 'butter_apple', 'butter_lemon'];
  const is8 = name.includes('8개입');
  const qtyMult = is8 ? 8 : 20;
  const fields = getCostFields(name);

  fields.forEach(f => {
    if (butterKeys.includes(f.key) && !(f.key in butterCfg)) return;

    const v = getFieldVal(f);
    vals[f.key] = v;

    if (f.type === 'fixed') { total += f.fixed; return; }
    if (f.type === 'eggs')  { return; }

    let contrib;
    if (butterKeys.includes(f.key)) {
      const mult = butterCfg[f.key];
      if (f.key === 'butter_dono')       contrib = v / 2700 * mult;
      else if (f.key === 'butter_apple') contrib = v / 600  * mult;
      else if (f.key === 'butter_lemon') contrib = v / 2300 * mult;
    } else if (['premix','redbean','walnut','milk','egg','dough_butter'].includes(f.key) && !(name in costFieldsSide)) {
      if (f.key === 'premix')            contrib = eggs > 0 ? v / eggs * qtyMult : 0;
      else if (f.key === 'redbean')      contrib = eggs > 0 ? v / eggs * qtyMult : 0;
      else if (f.key === 'walnut')       contrib = eggs > 0 ? v / 4 / eggs * qtyMult : 0;
      else if (f.key === 'milk')         contrib = eggs > 0 ? v / eggs * qtyMult : 0;
      else if (f.key === 'egg')          contrib = eggs > 0 ? v / 30 * 110 / eggs * qtyMult : 0;
      else if (f.key === 'dough_butter') contrib = eggs > 0 ? v / eggs * qtyMult : 0;
    } else {
      contrib = f.formula ? f.formula(v, eggs) : 0;
    }
    if (contrib === undefined) contrib = 0;
    total += contrib;

    const cvEl = document.getElementById('cv-' + f.key);
    if (cvEl) cvEl.textContent = fmtCalc(contrib);

    if (!is8 && profit20Keys.has(f.key)) {
      const cpEl = document.getElementById('cp-' + f.key);
      if (cpEl) {
        const t20 = fmtTimes20(contrib);
        if (t20) {
          cpEl.textContent = '×20 = ' + t20;
          cpEl.className = 'cost-profit-val positive';
        } else {
          cpEl.textContent = '';
        }
      }
    }
  });

  // eggs 값도 저장 대상에 포함
  vals.eggs = eggs;
  currentVals[name] = vals;

  const margin = price - total;
  const marginPct = price > 0 ? ((margin / price) * 100).toFixed(1) : null;
  const costPct   = price > 0 ? ((total  / price) * 100).toFixed(1) : null;
  const cls = margin >= 0 ? 'positive' : 'negative';

  document.getElementById('result-bar').innerHTML =
    `<div class="result-card">
      <div class="result-label">총 원가</div>
      <div class="result-value">${total.toFixed(1)}원</div>
      <div class="result-pct">${costPct !== null ? costPct + '%' : '-'}</div>
    </div>
    <div class="result-card">
      <div class="result-label">마진</div>
      <div class="result-value ${cls}">${margin.toFixed(1)}원</div>
      <div class="result-pct ${cls}">${marginPct !== null ? marginPct + '%' : '-'}</div>
    </div>
    <div class="result-card">
      <div class="result-label">판매가</div>
      <div class="result-value">${price.toLocaleString()}원</div>
    </div>`;
}

function saveData(name) {
  if (currentVals[name]) savedCosts[name] = { ...currentVals[name] };
  try {
    localStorage.setItem('bokhodu_costs', JSON.stringify(savedCosts));
    refreshAllGrids();
    showToast('저장되었습니다 ✓');
  } catch(e) { showToast('저장 실패'); }
}

let _pendingResetCallback = null;

function confirmReset(name, price) {
  const modal = document.getElementById('confirm-modal');
  document.getElementById('modal-title').textContent = '초기화 확인';
  document.getElementById('modal-desc').textContent =
    `'${name}'\n입력한 원가 값을 모두 초기화합니다.\n이 작업은 되돌릴 수 없습니다.`;

  _pendingResetCallback = () => {
    closeModal();
    resetData(name, price);
  };

  document.getElementById('modal-confirm-btn').onclick = _pendingResetCallback;
  modal.classList.add('show');
  modal.onclick = (e) => { if (e.target === modal) closeModal(); };
}

function closeModal() {
  document.getElementById('confirm-modal').classList.remove('show');
  _pendingResetCallback = null;
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

function resetData(name, price) {
  delete savedCosts[name];
  try {
    localStorage.setItem('bokhodu_costs', JSON.stringify(savedCosts));
  } catch(e) {}
  renderCalc(name, price);
  if (selectedEl) selectedEl.classList.add('selected');
  refreshAllGrids();
  showToast('초기화되었습니다');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function refreshAllGrids() {
  const prevId = selectedEl ? selectedEl.id : null;

  renderGrid('grid-mix-20',    products.mix20);
  renderGrid('grid-single-20', products.single20);
  renderGrid('grid-single-8',  products.single8);
  renderGrid('grid-mix-8',     products.mix8);
  renderGrid('grid-side',      products.side);
  renderGrid('grid-gift',      products.gift);

  if (prevId) {
    const restored = document.getElementById(prevId);
    if (restored) {
      restored.classList.add('selected');
      selectedEl = restored;
    }
  }
}
</script>
</body>
</html>
