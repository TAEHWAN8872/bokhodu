<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>복호두 원가 계산기</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #ffffff;
    --bg-sub:       #f7f7f6;
    --bg-card:      #ffffff;
    --bg-selected:  #f0f7ff;
    --bg-saved:     #f0faf0;
    --bg-input:     #fafafa;

    --ink:          #111110;
    --ink-2:        #6b6b67;
    --ink-3:        #a8a8a3;

    --accent:       #2563eb;
    --accent-bg:    #eff6ff;
    --accent-border:#93c5fd;

    --green:        #16a34a;
    --green-bg:     #f0fdf4;
    --green-border: #86efac;

    --red:          #dc2626;

    --border:       #e5e5e3;
    --border-strong:#d0d0cd;

    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;

    --font: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', sans-serif;
    --font-mono: 'SF Mono', 'Fira Mono', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:           #111110;
      --bg-sub:       #1a1a18;
      --bg-card:      #1e1e1c;
      --bg-selected:  #1a2a3a;
      --bg-saved:     #0d1f14;
      --bg-input:     #1a1a18;

      --ink:          #f0efeb;
      --ink-2:        #9a9994;
      --ink-3:        #5a5a56;

      --accent:       #60a5fa;
      --accent-bg:    #1e3a5f;
      --accent-border:#3b82f6;

      --green:        #4ade80;
      --green-bg:     #052e16;
      --green-border: #166534;

      --red:          #f87171;

      --border:       #2a2a28;
      --border-strong:#3a3a38;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg-sub);
    color: var(--ink);
    min-height: 100vh;
    padding: 32px 16px 80px;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  header p {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.5;
  }

  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 3px;
  }

  .tab-btn {
    flex: 1;
    padding: 8px 16px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--ink-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .tab-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 1px 3px rgba(37,99,235,0.25);
  }

  .section-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 20px;
  }

  .section-title:first-child { margin-top: 0; }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 6px;
    margin-bottom: 4px;
  }

  .product-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 11px 13px;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s, box-shadow 0.12s;
    user-select: none;
  }

  .product-card:hover {
    border-color: var(--border-strong);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .product-card.selected {
    border-color: var(--accent-border);
    background: var(--bg-selected);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
  }

  .product-card.saved {
    border-color: var(--green-border);
    background: var(--bg-saved);
  }

  .product-card.saved.selected {
    border-color: var(--accent-border);
    background: var(--bg-selected);
  }

  .product-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 3px;
    line-height: 1.4;
  }

  .product-card.selected .product-name { color: var(--accent); }
  .product-card.saved .product-name     { color: var(--green); }
  .product-card.saved.selected .product-name { color: var(--accent); }

  .product-price {
    font-size: 12px;
    color: var(--ink-2);
    font-variant-numeric: tabular-nums;
  }

  .product-card.selected .product-price { color: var(--accent); opacity: 0.75; }
  .product-card.saved .product-price    { color: var(--green);  opacity: 0.75; }

  .saved-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    margin-left: 4px;
    vertical-align: middle;
    margin-bottom: 1px;
  }

  .placeholder {
    color: var(--ink-3);
    font-size: 14px;
    padding: 48px 0;
    text-align: center;
    margin-top: 20px;
    background: var(--bg-card);
    border: 1px dashed var(--border-strong);
    border-radius: var(--r-lg);
  }

  .calc-panel {
    margin-top: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
  }

  .calc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 6px;
    background: var(--bg-sub);
  }

  .calc-product-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .calc-product-price {
    font-size: 13px;
    color: var(--ink-2);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-variant-numeric: tabular-nums;
  }

  .cost-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  @media (max-width: 420px) {
    .cost-grid { grid-template-columns: 1fr; }
  }

  .cost-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 14px 16px;
    background: var(--bg-card);
  }

  .cost-label {
    font-size: 11px;
    color: var(--ink-2);
    font-weight: 600;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .cost-hint {
    font-weight: 400;
    font-size: 10px;
    color: var(--ink-3);
    font-family: var(--font-mono);
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .input-row .cost-input { flex: 1; min-width: 0; }

  .cost-input {
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    padding: 7px 9px;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg-input);
    width: 100%;
    font-family: var(--font);
    transition: border-color 0.12s, box-shadow 0.12s;
    font-variant-numeric: tabular-nums;
  }

  .cost-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    background: var(--bg-card);
  }

  .cost-calc-val {
    font-size: 12px;
    color: var(--accent);
    white-space: nowrap;
    min-width: 48px;
    text-align: right;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    font-family: var(--font-mono);
  }

  .cost-profit-val { display: none; }

  .cost-fixed {
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 7px 9px;
    font-size: 13px;
    color: var(--ink-3);
    background: var(--bg-sub);
    width: 100%;
    font-variant-numeric: tabular-nums;
  }

  .cost-preset-display {
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    padding: 7px 9px;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg-input);
    width: 100%;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
    font-variant-numeric: tabular-nums;
  }

  .cost-preset-display:hover {
    border-color: var(--accent);
    background: var(--accent-bg);
    color: var(--accent);
  }

  .result-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    padding: 0;
  }

  .result-card {
    padding: 18px 16px;
    text-align: center;
    position: relative;
  }

  .result-card + .result-card::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 1px;
    background: var(--border);
  }

  .result-card:nth-child(2) {
    background: var(--bg-sub);
  }

  .result-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 6px;
  }

  .result-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }

  .result-value.positive { color: var(--green); }
  .result-value.negative { color: var(--red); }

  .result-pct {
    font-size: 12px;
    color: var(--ink-3);
    margin-top: 4px;
    font-weight: 500;
  }

  .result-pct.positive { color: var(--green); }
  .result-pct.negative { color: var(--red); }

  .action-bar {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-sub);
  }

  .btn-save {
    flex: 2;
    padding: 10px;
    border-radius: var(--r-sm);
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: opacity 0.12s;
    letter-spacing: 0.01em;
  }

  .btn-save:hover { opacity: 0.88; }

  .btn-reset {
    flex: 1;
    padding: 10px;
    border-radius: var(--r-sm);
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    color: var(--ink-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.12s, color 0.12s;
  }

  .btn-reset:hover {
    background: var(--bg-sub);
    color: var(--ink);
  }

  .save-toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: var(--ink);
    color: var(--bg);
    padding: 9px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 999;
    white-space: nowrap;
  }

  .save-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s;
  }

  .modal-backdrop.show {
    opacity: 1;
    pointer-events: all;
  }

  .modal-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 24px 24px 20px;
    max-width: 300px;
    width: calc(100% - 40px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    transform: scale(0.95) translateY(8px);
    transition: transform 0.18s;
  }

  .modal-backdrop.show .modal-box {
    transform: scale(1) translateY(0);
  }

  .modal-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #fef2f2;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    font-size: 18px;
  }

  .modal-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }

  .modal-desc {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.55;
    margin-bottom: 20px;
  }

  .modal-btns {
    display: flex;
    gap: 8px;
  }

  .modal-btn-cancel {
    flex: 1;
    padding: 10px;
    border-radius: var(--r-sm);
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    color: var(--ink-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.12s;
  }

  .modal-btn-cancel:hover { background: var(--bg-sub); }

  .modal-btn-confirm {
    flex: 1;
    padding: 10px;
    border-radius: var(--r-sm);
    border: none;
    background: var(--red);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: opacity 0.12s;
  }

  .modal-btn-confirm:hover { opacity: 0.85; }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-eyebrow">원가 계산기</div>
    <h1>복호두</h1>
    <p>제품을 선택하고 원가 항목을 입력하면 마진을 자동으로 계산합니다</p>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('20')">20개입 호두과자</button>
    <button class="tab-btn" onclick="switchTab('8')">답례품 (8개입)</button>
  </div>

  <div id="panel-20">
    <p class="section-title">단일 맛 (1종)</p>
    <div class="product-grid" id="grid-single-20"></div>
    <p class="section-title">믹스 조합 (2종)</p>
    <div class="product-grid" id="grid-mix-20"></div>
  </div>

  <div id="panel-8" class="hidden">
    <p class="section-title">단일 맛 (1종)</p>
    <div class="product-grid" id="grid-single-8"></div>
    <p class="section-title">믹스 조합 (2종)</p>
    <div class="product-grid" id="grid-mix-8"></div>
  </div>

  <div id="calc-area">
    <div class="placeholder">제품을 클릭하면 원가 계산기가 열립니다</div>
  </div>
</div>

<div class="modal-backdrop" id="confirm-modal">
  <div class="modal-box">
    <div class="modal-icon">🗑️</div>
    <div class="modal-title" id="modal-title">초기화 확인</div>
    <div class="modal-desc" id="modal-desc">입력값을 초기화할까요?</div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn-confirm" id="modal-confirm-btn">초기화</button>
    </div>
  </div>
</div>

<div class="save-toast" id="toast"></div>

<script>
const products = {
  mix20: [
    {name:'팥&양 20개입', price:9500},
    {name:'팥&레몬 20개입', price:10000},
    {name:'팥&청사과 20개입', price:11000},
    {name:'양&레몬 20개입', price:11000},
    {name:'양&청사과 20개입', price:12000},
    {name:'레몬&청사과 20개입', price:12500},
  ],
  single20: [
    {name:'팥호두과자 20개입', price:8000},
    {name:'양버터 20개입', price:10000},
    {name:'레몬버터 20개입', price:11000},
    {name:'청사과 20개입', price:13000},
  ],
  single8: [
    {name:'팥호두과자 8개입', price:4000},
    {name:'양버터 8개입', price:5000},
    {name:'레몬버터 8개입', price:5500},
    {name:'청사과버터 8개입', price:6500},
  ],
  mix8: [
    {name:'팥&양 8개입', price:4500},
    {name:'팥&레몬 8개입', price:4800},
    {name:'팥&청사과 8개입', price:5300},
    {name:'양&레몬 8개입', price:5300},
    {name:'양&청사과 8개입', price:5800},
    {name:'레몬&청사과 8개입', price:6100},
  ]
};

// ── 20개입 전용 원가 필드 ──
const costFields20 = [
  { key:'premix',        label:'프리믹스',   type:'preset', defaultVal:25300,  hint:'÷ 생산알수 ×20',         formula:(v,e)=> e>0 ? v/e*20 : 0 },
  { key:'redbean',       label:'팥앙금',     type:'preset', defaultVal:71060,  hint:'÷ 생산알수 ×20',         formula:(v,e)=> e>0 ? v/e*20 : 0 },
  { key:'eggs',          label:'생산알수',   type:'eggs',                       hint:'원가 미적용' },
  { key:'box',           label:'상자',       type:'preset', defaultVal:153120, hint:'÷ 400',                  formula:(v)=> v/400 },
  { key:'cross',         label:'십자간지',   type:'preset', defaultVal:165000, hint:'÷ 1,200',                formula:(v)=> v/1200 },
  { key:'paper',         label:'유산지',     type:'fixed',  fixed:22 },
  { key:'wrap',          label:'화지',       type:'fixed',  fixed:24 },
  { key:'dough_butter',  label:'반죽버터',   type:'preset', defaultVal:1623,   hint:'÷ 생산알수 ×20',         formula:(v,e)=> e>0 ? v/e*20 : 0 },
  { key:'butter_dono',   label:'도노버터',   type:'preset', defaultVal:147400, hint:'÷ 2,700 ×20',            formula:(v)=> v/2700*20 },
  { key:'butter_apple',  label:'청사과버터', type:'preset', defaultVal:114950, hint:'÷ 600 ×20',              formula:(v)=> v/600*20 },
  { key:'butter_lemon',  label:'레몬버터',   type:'preset', defaultVal:178200, hint:'÷ 2,300 ×20',            formula:(v)=> v/2300*20 },
  { key:'walnut',        label:'벌크호두',   type:'preset', defaultVal:125000, hint:'÷ 4 ÷ 생산알수 ×20',     formula:(v,e)=> e>0 ? v/4/e*20 : 0 },
  { key:'milk',          label:'우유',       type:'preset', defaultVal:2100,   hint:'÷ 생산알수 ×20',         formula:(v,e)=> e>0 ? v/e*20 : 0 },
  { key:'egg',           label:'계란',       type:'preset', defaultVal:8500,   hint:'÷30 ×110 ÷생산알수 ×20', formula:(v,e)=> e>0 ? v/30*110/e*20 : 0 },
  { key:'sticker',       label:'스티커',     type:'fixed',  fixed:17 },
  { key:'vinyl',         label:'비닐봉투',   type:'fixed',  fixed:67 },
];

// ── 답례품(8개입) 전용 원가 필드 ──
// 유산지 없음 / 화지 10원 고정 / 상자 149160÷600 / 십자간지 20460÷600 / 비닐봉투 44원 고정
const costFields8 = [
  { key:'premix',        label:'프리믹스',   type:'preset', defaultVal:25300,  hint:'÷ 생산알수 ×8',          formula:(v,e)=> e>0 ? v/e*8 : 0 },
  { key:'redbean',       label:'팥앙금',     type:'preset', defaultVal:71060,  hint:'÷ 생산알수 ×8',          formula:(v,e)=> e>0 ? v/e*8 : 0 },
  { key:'eggs',          label:'생산알수',   type:'eggs',                       hint:'원가 미적용' },
  { key:'box',           label:'상자',       type:'preset', defaultVal:149160, hint:'÷ 600',                  formula:(v)=> v/600 },
  { key:'cross',         label:'십자간지',   type:'preset', defaultVal:20460,  hint:'÷ 600',                  formula:(v)=> v/600 },
  { key:'wrap',          label:'화지',       type:'fixed',  fixed:10 },
  { key:'dough_butter',  label:'반죽버터',   type:'preset', defaultVal:1623,   hint:'÷ 생산알수 ×8',          formula:(v,e)=> e>0 ? v/e*8 : 0 },
  { key:'butter_dono',   label:'도노버터',   type:'preset', defaultVal:147400, hint:'÷ 2,700 ×4',             formula:(v)=> v/2700*4 },
  { key:'butter_apple',  label:'청사과버터', type:'preset', defaultVal:114950, hint:'÷ 600 ×4',               formula:(v)=> v/600*4 },
  { key:'butter_lemon',  label:'레몬버터',   type:'preset', defaultVal:178200, hint:'÷ 2,300 ×4',             formula:(v)=> v/2300*4 },
  { key:'walnut',        label:'벌크호두',   type:'preset', defaultVal:125000, hint:'÷ 4 ÷ 생산알수 ×8',      formula:(v,e)=> e>0 ? v/4/e*8 : 0 },
  { key:'milk',          label:'우유',       type:'preset', defaultVal:2100,   hint:'÷ 생산알수 ×8',          formula:(v,e)=> e>0 ? v/e*8 : 0 },
  { key:'egg',           label:'계란',       type:'preset', defaultVal:8500,   hint:'÷30 ×110 ÷생산알수 ×8',  formula:(v,e)=> e>0 ? v/30*110/e*8 : 0 },
  { key:'sticker',       label:'스티커',     type:'fixed',  fixed:17 },
  { key:'vinyl',         label:'비닐봉투',   type:'fixed',  fixed:44 },
];

const profit20Keys = new Set(['premix', 'redbean', 'walnut', 'milk', 'egg']);

function getCostFields(name) {
  return name.includes('8개입') ? costFields8 : costFields20;
}

function fmt(n) {
  if (n === null || n === undefined || n === '') return '';
  return Number(n).toLocaleString('ko-KR');
}

function fmtCalc(n) {
  if (!n || n === 0) return '-';
  const s = n.toFixed(2).replace(/\.?0+$/, '');
  return s + '원';
}

function fmtTimes20(contrib) {
  if (!contrib || contrib === 0) return null;
  const val = contrib * 20;
  return (Math.round(val * 100) / 100).toLocaleString('ko-KR', {maximumFractionDigits:2}) + '원';
}

const savedCosts = {};
try {
  const raw = JSON.parse(localStorage.getItem('bokhodu_costs') || '{}');
  Object.assign(savedCosts, raw);
} catch(e) {}

const currentVals = {};

function renderGrid(id, list) {
  const el = document.getElementById(id);
  el.innerHTML = list.map((p, i) => {
    const isSaved = !!savedCosts[p.name];
    const savedCls = isSaved ? ' saved' : '';
    const dot = isSaved ? '<span class="saved-dot"></span>' : '';
    return `<div class="product-card${savedCls}" id="card-${id}-${i}"
      onclick="selectProduct(this,'${p.name.replace(/'/g,"\\'")}',${p.price})">
      <div class="product-name">${p.name}${dot}</div>
      <div class="product-price">${p.price.toLocaleString()}원</div>
    </div>`;
  }).join('');
}

let selectedEl = null;

renderGrid('grid-mix-20',    products.mix20);
renderGrid('grid-single-20', products.single20);
renderGrid('grid-single-8',  products.single8);
renderGrid('grid-mix-8',     products.mix8);

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', (t === '20' && i === 0) || (t === '8' && i === 1))
  );
  document.getElementById('panel-20').classList.toggle('hidden', t !== '20');
  document.getElementById('panel-8').classList.toggle('hidden', t !== '8');
  if (selectedEl) { selectedEl.classList.remove('selected'); selectedEl = null; }
  document.getElementById('calc-area').innerHTML =
    '<div class="placeholder">제품을 클릭하면 원가 계산기가 열립니다</div>';
}

function selectProduct(el, name, price) {
  if (selectedEl) selectedEl.classList.remove('selected');
  el.classList.add('selected');
  selectedEl = el;
  renderCalc(name, price);
}

function togglePreset(key, name, price) {
  const display = document.getElementById('pd-' + key);
  const input   = document.getElementById('pi-' + key);
  if (!display || !input) return;
  const isEditing = input.style.display !== 'none';
  if (isEditing) {
    const raw = parseFloat(input.value) || 0;
    display.textContent = fmt(raw);
    display.style.display = '';
    input.style.display = 'none';
    updateResult(name, price);
  } else {
    display.style.display = 'none';
    input.style.display = '';
    input.focus();
    input.select();
  }
}

function getButterConfig(name) {
  const hasDono  = name.includes('양');
  const hasApple = name.includes('청사과');
  const hasLemon = name.includes('레몬');
  const isMix    = name.includes('&');
  const is8      = name.includes('8개입');
  const multi = is8 ? (isMix ? 4 : 8) : (isMix ? 10 : 20);
  const result = {};
  if (hasDono)  result['butter_dono']  = multi;
  if (hasApple) result['butter_apple'] = multi;
  if (hasLemon) result['butter_lemon'] = multi;
  return result;
}

function renderCalc(name, price) {
  const saved = savedCosts[name] || {};
  const esc = name.replace(/'/g,"\'");
  const butterCfg = getButterConfig(name);
  const butterKeys = ['butter_dono', 'butter_apple', 'butter_lemon'];
  const is8 = name.includes('8개입');
  const qtyMult = is8 ? 8 : 20;

  // 제품 유형에 맞는 필드셋 선택
  const fields = getCostFields(name);

  const rows = fields.map(f => {
    if (butterKeys.includes(f.key) && !(f.key in butterCfg)) return '';
    if (f.key === 'dough_butter' && name.includes('청사과')) return '';

    if (f.type === 'fixed') {
      return `<div class="cost-item">
        <label class="cost-label">${f.label} <span class="cost-hint">고정</span></label>
        <div class="input-row">
          <div class="cost-fixed">${fmt(f.fixed)}</div>
          <span class="cost-calc-val">${fmt(f.fixed)}원</span>
        </div>
      </div>`;
    }

    if (f.type === 'eggs') {
      const val = saved[f.key] !== undefined ? saved[f.key] : '';
      return `<div class="cost-item">
        <label class="cost-label">${f.label} <span class="cost-hint">${f.hint}</span></label>
        <div class="input-row">
          <input class="cost-input eggs-input" type="number" id="ci-eggs" placeholder="0"
            value="${val}" oninput="updateResult('${esc}',${price})" />
          <span class="cost-calc-val" id="cv-eggs">-</span>
        </div>
      </div>`;
    }

    if (f.type === 'preset') {
      const initVal = saved[f.key] !== undefined ? saved[f.key] : f.defaultVal;
      const profitRow = profit20Keys.has(f.key) && !is8
        ? `<div class="cost-profit-val" id="cp-${f.key}"></div>`
        : '';
      let hintText = f.hint || '';
      if (butterKeys.includes(f.key)) {
        if (f.key === 'butter_apple') hintText = '÷ 600 ×' + butterCfg[f.key];
        else if (f.key === 'butter_lemon') hintText = '÷ 2,300 ×' + butterCfg[f.key];
        else hintText = '÷ 2,700 ×' + butterCfg[f.key];
      }
      return `<div class="cost-item">
        <label class="cost-label">${f.label} <span class="cost-hint">${hintText}</span></label>
        <div class="input-row">
          <div class="preset-wrap" style="flex:1;min-width:0;">
            <div id="pd-${f.key}" class="cost-preset-display" onclick="togglePreset('${f.key}','${esc}',${price})"
              title="클릭하여 수정">${fmt(initVal)}</div>
            <input id="pi-${f.key}" class="cost-input" type="number" style="display:none"
              value="${initVal}"
              onblur="togglePreset('${f.key}','${esc}',${price})"
              oninput="updateResult('${esc}',${price})" />
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
            <span class="cost-calc-val" id="cv-${f.key}">-</span>
            ${profitRow}
          </div>
        </div>
      </div>`;
    }

    const val = saved[f.key] !== undefined ? saved[f.key] : '';
    return `<div class="cost-item">
      <label class="cost-label">${f.label} <span class="cost-hint">${f.hint||''}</span></label>
      <div class="input-row">
        <input class="cost-input" type="number" id="ci-${f.key}" placeholder="0"
          value="${val}" oninput="updateResult('${esc}',${price})" />
        <span class="cost-calc-val" id="cv-${f.key}">-</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('calc-area').innerHTML =
    `<div class="calc-panel">
      <div class="calc-header">
        <span class="calc-product-name">${name}</span>
        <span class="calc-product-price">판매가 ${price.toLocaleString()}원</span>
      </div>
      <div class="cost-grid">${rows}</div>
      <div class="result-bar" id="result-bar"></div>
      <div class="action-bar">
        <button class="btn-save" onclick="saveData('${esc}')">저장하기</button>
        <button class="btn-reset" onclick="confirmReset('${esc}',${price})">초기화</button>
      </div>
    </div>`;

  updateResult(name, price);
}

function getFieldVal(f) {
  if (f.type === 'fixed') return f.fixed;
  if (f.type === 'eggs')  return parseFloat(document.getElementById('ci-eggs')?.value) || 0;
  if (f.type === 'preset') return parseFloat(document.getElementById('pi-' + f.key)?.value) || 0;
  return parseFloat(document.getElementById('ci-' + f.key)?.value) || 0;
}

function updateResult(name, price) {
  const eggs = getFieldVal({ type:'eggs' });
  let total = 0;
  const vals = {};
  const butterCfg = getButterConfig(name);
  const butterKeys = ['butter_dono', 'butter_apple', 'butter_lemon'];
  const is8 = name.includes('8개입');
  const qtyMult = is8 ? 8 : 20;

  // 제품 유형에 맞는 필드셋 선택
  const fields = getCostFields(name);

  fields.forEach(f => {
    if (butterKeys.includes(f.key) && !(f.key in butterCfg)) return;

    const v = getFieldVal(f);
    vals[f.key] = v;

    if (f.type === 'fixed') { total += f.fixed; return; }
    if (f.type === 'eggs')  { return; }

    let contrib;
    if (butterKeys.includes(f.key)) {
      const mult = butterCfg[f.key];
      if (f.key === 'butter_dono')       contrib = v / 2700 * mult;
      else if (f.key === 'butter_apple') contrib = v / 600  * mult;
      else if (f.key === 'butter_lemon') contrib = v / 2300 * mult;
    } else if (['premix','redbean','walnut','milk','egg','dough_butter'].includes(f.key)) {
      if (f.key === 'premix')            contrib = eggs > 0 ? v / eggs * qtyMult : 0;
      else if (f.key === 'redbean')      contrib = eggs > 0 ? v / eggs * qtyMult : 0;
      else if (f.key === 'walnut')       contrib = eggs > 0 ? v / 4 / eggs * qtyMult : 0;
      else if (f.key === 'milk')         contrib = eggs > 0 ? v / eggs * qtyMult : 0;
      else if (f.key === 'egg')          contrib = eggs > 0 ? v / 30 * 110 / eggs * qtyMult : 0;
      else if (f.key === 'dough_butter') contrib = eggs > 0 ? v / eggs * qtyMult : 0;
    } else {
      contrib = f.formula ? f.formula(v, eggs) : 0;
    }
    total += contrib;

    const cvEl = document.getElementById('cv-' + f.key);
    if (cvEl) cvEl.textContent = fmtCalc(contrib);

    if (!is8 && profit20Keys.has(f.key)) {
      const cpEl = document.getElementById('cp-' + f.key);
      if (cpEl) {
        const t20 = fmtTimes20(contrib);
        if (t20) {
          cpEl.textContent = '×20 = ' + t20;
          cpEl.className = 'cost-profit-val positive';
        } else {
          cpEl.textContent = '';
        }
      }
    }
  });

  currentVals[name] = vals;

  const margin = price - total;
  const marginPct = price > 0 ? ((margin / price) * 100).toFixed(1) : null;
  const costPct   = price > 0 ? ((total  / price) * 100).toFixed(1) : null;
  const cls = margin >= 0 ? 'positive' : 'negative';

  document.getElementById('result-bar').innerHTML =
    `<div class="result-card">
      <div class="result-label">총 원가</div>
      <div class="result-value">${total.toFixed(1)}원</div>
      <div class="result-pct">${costPct !== null ? costPct + '%' : '-'}</div>
    </div>
    <div class="result-card">
      <div class="result-label">마진</div>
      <div class="result-value ${cls}">${margin.toFixed(1)}원</div>
      <div class="result-pct ${cls}">${marginPct !== null ? marginPct + '%' : '-'}</div>
    </div>
    <div class="result-card">
      <div class="result-label">판매가</div>
      <div class="result-value">${price.toLocaleString()}원</div>
    </div>`;
}

function saveData(name) {
  if (currentVals[name]) savedCosts[name] = currentVals[name];
  try {
    localStorage.setItem('bokhodu_costs', JSON.stringify(savedCosts));
    refreshAllGrids();
    showToast('저장되었습니다 ✓');
  } catch(e) { showToast('저장 실패'); }
}

let _pendingResetCallback = null;

function confirmReset(name, price) {
  const modal = document.getElementById('confirm-modal');
  document.getElementById('modal-title').textContent = '초기화 확인';
  document.getElementById('modal-desc').textContent =
    `'${name}'\n입력한 원가 값을 모두 초기화합니다.\n이 작업은 되돌릴 수 없습니다.`;

  _pendingResetCallback = () => {
    closeModal();
    resetData(name, price);
  };

  document.getElementById('modal-confirm-btn').onclick = _pendingResetCallback;
  modal.classList.add('show');
  modal.onclick = (e) => { if (e.target === modal) closeModal(); };
}

function closeModal() {
  document.getElementById('confirm-modal').classList.remove('show');
  _pendingResetCallback = null;
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

function resetData(name, price) {
  delete savedCosts[name];
  try {
    localStorage.setItem('bokhodu_costs', JSON.stringify(savedCosts));
  } catch(e) {}
  renderCalc(name, price);
  refreshAllGrids();
  showToast('초기화되었습니다');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function refreshAllGrids() {
  const prevId = selectedEl ? selectedEl.id : null;

  renderGrid('grid-mix-20',    products.mix20);
  renderGrid('grid-single-20', products.single20);
  renderGrid('grid-single-8',  products.single8);
  renderGrid('grid-mix-8',     products.mix8);

  if (prevId) {
    const restored = document.getElementById(prevId);
    if (restored) {
      restored.classList.add('selected');
      selectedEl = restored;
    }
  }
}
</script>
</body>
</html>
