<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광주수완점 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-900">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-xl font-bold text-indigo-600 tracking-wider">FRANCHISE ANALYTICS</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button class="p-2 text-gray-400 hover:text-gray-500 rounded-full focus:outline-none">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg>
                    </button>
                    <img class="h-8 w-8 rounded-full border border-gray-200" src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="Admin Profile">
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">대시보드</h1>
                <p class="text-sm text-gray-500 mt-1">실시간 프랜차이즈 매장 성과 분석 대시보드입니다.</p>
            </div>
            <div class="flex items-center gap-3 bg-white px-4 py-2 rounded-xl shadow-xs border border-gray-200">
                <span class="text-sm font-semibold text-gray-600 uppercase tracking-wider">매장 선택:</span>
                <select id="storeSelect" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2 font-medium">
                    <option value="광주수완점">광주수완점</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100 flex items-center space-x-4 hover:shadow-md transition-shadow duration-200">
                <div class="p-4 bg-indigo-50 rounded-xl text-indigo-600">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-400 uppercase tracking-wider">월 매출액</p>
                    <h3 id="salesKpi" class="text-2xl font-bold mt-1 text-gray-900">-</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100 flex items-center space-x-4 hover:shadow-md transition-shadow duration-200">
                <div class="p-4 bg-emerald-50 rounded-xl text-emerald-600">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-400 uppercase tracking-wider">평균 객단가</p>
                    <h3 id="customerValueKpi" class="text-2xl font-bold mt-1 text-gray-900">-</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100 flex items-center space-x-4 hover:shadow-md transition-shadow duration-200">
                <div class="p-4 bg-amber-50 rounded-xl text-amber-600">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z" />
                    </svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-400 uppercase tracking-wider">순이익률 (마진)</p>
                    <h3 id="marginKpi" class="text-2xl font-bold mt-1 text-gray-900">-</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100 flex items-center space-x-4 hover:shadow-md transition-shadow duration-200">
                <div class="p-4 bg-rose-50 rounded-xl text-rose-600">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                    </svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-400 uppercase tracking-wider">고객 리뷰 평점</p>
                    <h3 id="ratingKpi" class="text-2xl font-bold mt-1 text-gray-900">-</h3>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-gray-800">월별 매출 및 순이익 추이</h3>
                        <span class="text-xs font-semibold inline-block py-1 px-2 rounded-full text-indigo-600 bg-indigo-50 uppercase last:mr-0 mr-1">Line Chart</span>
                    </div>
                    <div class="relative h-80">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-gray-800">주요 지출 항목 분석</h3>
                        <span class="text-xs font-semibold inline-block py-1 px-2 rounded-full text-amber-600 bg-amber-50 uppercase last:mr-0 mr-1">Bar Chart</span>
                    </div>
                    <div class="relative h-80">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="space-y-8">
                <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100 flex flex-col h-full">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-gray-800">비용 구조 비율</h3>
                        <span class="text-xs font-semibold inline-block py-1 px-2 rounded-full text-emerald-600 bg-emerald-50 uppercase last:mr-0 mr-1">Pie Chart</span>
                    </div>
                    <div class="relative flex-1 min-h-[300px] flex items-center justify-center">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">운영 상세 정보</h3>
                    <div class="flow-root">
                        <ul class="divide-y divide-gray-100">
                            <li class="py-3.5 flex justify-between items-center">
                                <span class="text-sm font-medium text-gray-500">점주명</span>
                                <span id="detailOwner" class="text-sm font-semibold text-gray-900">-</span>
                            </li>
                            <li class="py-3.5 flex justify-between items-center">
                                <span class="text-sm font-medium text-gray-500">오픈 연도</span>
                                <span id="detailOpenYear" class="text-sm font-semibold text-gray-900">-</span>
                            </li>
                            <li class="py-3.5 flex justify-between items-center">
                                <span class="text-sm font-medium text-gray-500">매장 면적</span>
                                <span id="detailSize" class="text-sm font-semibold text-gray-900">-</span>
                            </li>
                            <li class="py-3.5 flex justify-between items-center">
                                <span class="text-sm font-medium text-gray-500">정직원 수</span>
                                <span id="detailEmployees" class="text-sm font-semibold text-gray-900">-</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ⭐️ 원본 데이터 구조를 100% 유지하고 다른 매장만 삭제했습니다.
        const data = [
            {
                store: "광주수완점",
                kpi: { sales: "₩38,500,000", customerValue: "₩13,500", margin: "24%", rating: "4.6 / 5.0" },
                monthly: {
                    labels: ["1월", "2월", "3월", "4월", "5월", "6월"],
                    sales: [3100, 3300, 3500, 3600, 3750, 3850],
                    profit: [710, 760, 810, 840, 880, 924]
                },
                expenses: {
                    labels: ["인건비", "임대료", "원재료비", "관리비", "마케팅비"],
                    values: [1100, 320, 1350, 210, 110]
                }
            }
        ];

        let trendChart, expenseChart, pieChart;
        const currencyFormatter = new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' });

        function updateDashboard(storeName) {
            const storeData = data.find(d => d.store === storeName);
            if (!storeData) return;

            document.getElementById('salesKpi').innerText = storeData.kpi.sales;
            document.getElementById('customerValueKpi').innerText = storeData.kpi.customerValue;
            document.getElementById('marginKpi').innerText = storeData.kpi.margin;
            document.getElementById('ratingKpi').innerText = storeData.kpi.rating;

            // 원본 파일 동작 방식대로 빈 칸 유지 처리
            document.getElementById('detailOwner').innerText = storeData.owner || '-';
            document.getElementById('detailOpenYear').innerText = storeData.openYear || '-';
            document.getElementById('detailSize').innerText = storeData.size || '-';
            document.getElementById('detailEmployees').innerText = storeData.employees || '-';

            const ctxTrend = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(ctxTrend, {
                type: 'line',
                data: {
                    labels: storeData.monthly.labels,
                    datasets: [
                        {
                            label: '매출액 (만원)',
                            data: storeData.monthly.sales,
                            borderColor: '#4f46e5',
                            backgroundColor: 'rgba(79, 70, 229, 0.05)',
                            fill: true,
                            tension: 0.35,
                            borderWidth: 3,
                            pointBackgroundColor: '#4f46e5'
                        },
                        {
                            label: '순이익 (만원)',
                            data: storeData.monthly.profit,
                            borderColor: '#10b981',
                            backgroundColor: 'transparent',
                            fill: false,
                            tension: 0.35,
                            borderWidth: 3,
                            pointBackgroundColor: '#10b981'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top', labels: { boxWidth: 12, font: { weight: 600 } } } },
                    scales: { y: { beginAtZero: false, grid: { color: '#f3f4f6' } }, x: { grid: { display: false } } }
                }
            });

            const ctxExpense = document.getElementById('expenseChart').getContext('2d');
            if (expenseChart) expenseChart.destroy();
            expenseChart = new Chart(ctxExpense, {
                type: 'bar',
                data: {
                    labels: storeData.expenses.labels,
                    datasets: [{
                        label: '지출 금액 (만원)',
                        data: storeData.expenses.values,
                        backgroundColor: ['#6366f1', '#fbbf24', '#f87171', '#34d399', '#a78bfa'],
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: '#f3f4f6' } }, x: { grid: { display: false } } }
                }
            });

            const ctxPie = document.getElementById('pieChart').getContext('2d');
            if (pieChart) pieChart.destroy();
            pieChart = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: storeData.expenses.labels,
                    datasets: [{
                        data: storeData.expenses.values,
                        backgroundColor: ['#6366f1', '#fbbf24', '#f87171', '#34d399', '#a78bfa'],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 15, font: { size: 11, weight: 500 } } } },
                    cutout: '65%'
                }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            const selectEl = document.getElementById('storeSelect');
            selectEl.addEventListener('change', (e) => {
                updateDashboard(e.target.value);
            });
            updateDashboard(selectEl.value);
        });
    </script>
</body>
</html>
